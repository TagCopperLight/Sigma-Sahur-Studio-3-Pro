# ============================================================
# Sigma Sahur Studio 3 Pro — Configuration applicative
# ============================================================

# --- Serveur ---
server.servlet.context-path=/sigma-sahur-studio-3-pro

# --- Base de données MySQL ---
# Credentials are defined in application-local.properties (gitignored)
# Copy application-local.properties.example → application-local.properties and fill in values
spring.config.import=optional:classpath:application-local.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# validate : vérifie que le schéma SQL correspond aux entités (schéma géré manuellement via sql/)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- SpringDoc / Swagger UI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Paris
